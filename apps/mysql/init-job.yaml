apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-init
  namespace: bidly
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mysql-init
          image: mysql:8.4
          command: ["sh", "-ec"]
          args:
            - |
              until mysqladmin ping -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" --silent; do sleep 2; done
              mysql -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" <<SQL
              CREATE DATABASE IF NOT EXISTS auth_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              CREATE DATABASE IF NOT EXISTS auction_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              CREATE USER IF NOT EXISTS 'auth_user'@'%' IDENTIFIED BY '${AUTH_DATABASE_PASSWORD}';
              CREATE USER IF NOT EXISTS 'auction_user'@'%' IDENTIFIED BY '${AUCTION_DATABASE_PASSWORD}';
              GRANT ALL PRIVILEGES ON auth_db.* TO 'auth_user'@'%';
              GRANT ALL PRIVILEGES ON auction_db.* TO 'auction_user'@'%';
              FLUSH PRIVILEGES;
              SQL
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bidly-mysql-secrets
                  key: root-password
            - name: AUTH_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bidly-mysql-secrets
                  key: auth-password
            - name: AUCTION_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bidly-mysql-secrets
                  key: auction-password

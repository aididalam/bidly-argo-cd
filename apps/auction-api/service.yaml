apiVersion: v1
kind: Service
metadata:
  name: auction
  namespace: bidly
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  selector:
    app.kubernetes.io/name: auction
  ports:
    - name: http
      port: 8082
      targetPort: http

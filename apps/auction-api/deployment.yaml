apiVersion: apps/v1
kind: Deployment
metadata:
  name: auction
  namespace: bidly
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auction
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auction
    spec:
      containers:
        - name: auction
          image: aididalam/bidly-auction:main-1
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: AUCTION_SERVICE_PORT
              value: "8082"
            - name: AUCTION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bidly-auction-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bidly-auction-secrets
                  key: jwt-secret
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: bidly-auction-secrets
                  key: aws-region
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bidly-auction-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bidly-auction-secrets
                  key: aws-secret-access-key
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: bidly-auction-secrets
                  key: s3-bucket
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bidly-auction-secrets
                  key: s3-endpoint
            - name: S3_PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: bidly-auction-secrets
                  key: s3-public-base-url
            - name: S3_USE_PATH_STYLE
              value: "true"
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

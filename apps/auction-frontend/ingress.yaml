apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auction-frontend
  namespace: bidly
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auction-frontend
                port:
                  name: http

apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: auction-frontend
  namespace: bidly
spec:
  hosts:
    - auction-frontend
  http:
    - route:
        - destination:
            host: auction-frontend
            subset: v9
          weight: 0
        - destination:
            host: auction-frontend
            subset: v14
          weight: 100

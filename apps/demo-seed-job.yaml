apiVersion: batch/v1
kind: Job
metadata:
  name: bidly-demo-seed
  namespace: bidly
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: demo-seed
          image: mysql:8.4
          command: ["sh", "-ec"]
          args:
            - |
              for attempt in $(seq 1 90); do
                if mysql -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e 'SELECT 1 FROM auth_db.users LIMIT 1; SELECT 1 FROM auction_db.products LIMIT 1' >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done

              mysql -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e 'SELECT 1 FROM auth_db.users LIMIT 1; SELECT 1 FROM auction_db.products LIMIT 1' >/dev/null

              mysql -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" <<'SQL'

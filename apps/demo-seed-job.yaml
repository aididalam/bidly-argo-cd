                ('a1000000-0000-4000-8000-000000000006', '11111111-1111-4111-8111-111111111111', 'Stoneware breakfast set', 'Six hand-thrown stoneware pieces with a speckled glaze and softly uneven rims. Everyday ceramics with a tactile, collected feel.', '', 1800.00, 1800.00, NULL, DATE_ADD(UTC_TIMESTAMP(6), INTERVAL 6 DAY), 'ACTIVE'),

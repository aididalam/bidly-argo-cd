                ('22222222-2222-4222-8222-222222222222', 'Nabil Hasan', 'user2@bidly.com', '$2y$10$EsnqF/z/8K.o7gPLBzqgz.CXGzT9Xxh64nbyQjmtid9LlT03OAxwu'),

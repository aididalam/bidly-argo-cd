                ('55555555-5555-4555-8555-555555555555', 'Samira Noor', 'user5@bidly.com', '$2y$10$EsnqF/z/8K.o7gPLBzqgz.CXGzT9Xxh64nbyQjmtid9LlT03OAxwu');

